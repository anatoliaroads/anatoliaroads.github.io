<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatolia Roads</title>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:Arial;
color:white;
overflow-x:hidden;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(to bottom,#111,#000);
}

h1{
font-size:70px;
margin:0;
color:#00ff99;
text-shadow:0 0 20px #00ff99;
}

p{
font-size:20px;
opacity:0.8;
}

.mods{
padding:50px 20px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.card{
background:#1a1a1a;
width:300px;
padding:25px;
border-radius:25px;
box-shadow:0 0 25px rgba(0,255,153,0.2);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

button{
background:#00ff99;
border:none;
padding:12px 25px;
border-radius:15px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

footer{
padding:30px;
text-align:center;
opacity:0.5;
}

</style>
</head>

<body>

<header>
<h1>🚍 Anatolia Roads</h1>
<p>ETS 2 Türkiye Haritası & Otobüs Modları</p>
</header>

<section class="mods">

<div class="card">
<h2>🗺️ Türkiye Haritası Fix</h2>
<p>Yeni ETS sürümü uyumluluk düzeltmesi.</p>
<button>İndir</button>
</div>

<div class="card">
<h2>🚌 Otobüs Paketleri</h2>
<p>Gerçekçi Türk otobüs modları.</p>
<button>İndir</button>
</div>

<div class="card">
<h2>🌧️ FPS & Yağmur Fix</h2>
<p>Düşük sistemler için optimize edildi.</p>
<button>İndir</button>
</div>

</section>

<footer>
Anatolia Roads © 2026
</footer>

</body>
</html>
